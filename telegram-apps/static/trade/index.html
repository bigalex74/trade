<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Trading League Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f0f2f5);
            --text-color: var(--tg-theme-text-color, #2c3e50);
            --hint-color: var(--tg-theme-hint-color, #7f8c8d);
            --link-color: var(--tg-theme-link-color, #3498db);
            --button-color: var(--tg-theme-button-color, #3498db);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            -webkit-user-select: none;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .risk-badge {
            padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;
            text-transform: uppercase; color: white;
        }
        .risk-green { background-color: var(--green); }
        .risk-orange { background-color: var(--orange); }
        .risk-red { background-color: var(--red); }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg); padding: 15px; border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center;
        }

        .stat-label { font-size: 12px; color: var(--hint-color); margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; }

        .trader-list {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .trader-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .trader-info div:first-child { font-weight: bold; font-size: 16px; }
        .trader-info div:last-child { font-size: 12px; color: var(--hint-color); margin-top: 2px; }

        .trader-pnl { font-weight: bold; text-align: right; }
        .pnl-pos { color: var(--green); }
        .pnl-neg { color: var(--red); }

        .tabs {
            display: flex; background: var(--card-bg); border-radius: 10px;
            padding: 4px; margin-bottom: 20px;
        }
        .tab {
            flex: 1; text-align: center; padding: 8px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: 500;
        }
        .tab.active { background: var(--button-color); color: var(--button-text-color); }

        .section-title { font-size: 14px; font-weight: bold; color: var(--hint-color); margin: 20px 0 10px 5px; text-transform: uppercase; }

        .loading { text-align: center; padding: 50px; color: var(--hint-color); }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0">AI League</h2>
        <div id="risk-level" class="risk-badge risk-green">Green Regime</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchDivision('moex')">MOEX (Stock)</div>
        <div class="tab" onclick="switchDivision('crypto')">Crypto</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Equity</div>
            <div id="total-equity" class="stat-value">0.00</div>
        </div>
        <div id="storm-mode-card" class="stat-card">
            <div class="stat-label">Storm Mode</div>
            <div id="storm-status" class="stat-value" style="color: var(--green)">OFF</div>
        </div>
    </div>

    <div class="section-title">Trading Agents</div>
    <div id="trader-list" class="trader-list">
        <div class="loading">Fetching data...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentDivision = 'moex';

        async function loadData() {
            try {
                const response = await fetch(`/api/trade/league?division=${currentDivision}`);
                const data = await response.json();
                renderUI(data);
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function switchDivision(div) {
            currentDivision = div;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('trader-list').innerHTML = '<div class="loading">Loading...</div>';
            loadData();
        }

        function renderUI(data) {
            const list = document.getElementById('trader-list');
            list.innerHTML = '';

            let totalEquity = 0;
            const currency = data.division === 'moex' ? '₽' : '$';

            data.traders.forEach(trader => {
                const equity = parseFloat(trader.cash_balance);
                totalEquity += equity;

                const item = document.createElement('div');
                item.className = 'trader-item';
                item.innerHTML = `
                    <div class="trader-info">
                        <div>👤 ${trader.trader_name}</div>
                        <div style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            🧠 ${trader.memory || 'Waiting for nightly audit...'}
                        </div>
                    </div>
                    <div class="trader-pnl">
                        <div>${equity.toLocaleString()} ${currency}</div>
                        <div class="pnl-pos" style="font-size: 11px">+0.00%</div>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('total-equity').innerText = `${totalEquity.toLocaleString()} ${currency}`;
            
            // Динамический риск
            const riskBadge = document.getElementById('risk-level');
            riskBadge.className = `risk-badge risk-${data.risk.toLowerCase()}`;
            riskBadge.innerText = `${data.risk} REGIME`;

            // Storm Mode
            const stormStatus = document.getElementById('storm-status');
            if (data.storm_mode) {
                stormStatus.innerText = 'ACTIVE (50% Risk)';
                stormStatus.style.color = 'var(--red)';
            } else {
                stormStatus.innerText = 'OFF';
                stormStatus.style.color = 'var(--green)';
            }
        }

        loadData();
        setInterval(loadData, 60000); // Обновление раз в минуту
    </script>
</body>
</html>
